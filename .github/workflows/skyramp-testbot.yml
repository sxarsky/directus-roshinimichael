name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Common source directories
      - 'src/**'
      - 'app/**'
      - 'lib/**'
      - 'api/**'
      - 'server/**'
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'core/**'
      # Monorepo patterns
      - 'packages/**'
      - 'apps/**'
      - 'services/**'
      # Go conventions
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      # Rust workspaces
      - 'crates/**'
      # Serverless
      - 'functions/**'
      # Frontend framework conventions
      - 'pages/**'
      - 'components/**'
      # Ruby/Rails
      - 'db/**'
      - 'config/**'
      # Common web patterns
      - 'routes/**'
      - 'controllers/**'
      - 'models/**'
      - 'views/**'
      - 'handlers/**'
      - 'middleware/**'
      # Tests
      - 'tests/**'
      - 'test/**'
      - 'spec/**'
      # Build and dependency files
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
      - 'requirements*.txt'
      - 'Pipfile'
      - 'poetry.lock'
      - 'go.mod'
      - 'go.sum'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pom.xml'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'Gemfile'
      - 'Gemfile.lock'
      - '*.csproj'
      - '*.sln'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.yaml'
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  testbot:
    # Only run for pull_request events or issue_comment on PRs mentioning @skyramp-testbot
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@skyramp-testbot'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      # Generate a GitHub App installation token to retrigger CI workflows on push
      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/making-authenticated-api-requests-with-a-github-app-in-a-github-actions-workflow
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: skyramp/testbot@v0.5.0
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          skyramp_mcp_version: next
          skyramp_executor_version: v1.3.13

          target_setup_command: 'docker compose -f docker-compose.testbot.yml up -d'
          target_teardown_command: 'docker compose -f docker-compose.testbot.yml down -v'
          target_ready_check_command: 'curl -sf http://localhost:8055/server/health'
          target_ready_check_timeout: 300
          auth_token_command: >
            curl -sf -X POST http://localhost:8055/auth/login
            -H 'Content-Type: application/json'
            -d '{"email":"admin@example.com","password":"admin"}'
            | jq -r '.data.access_token'

          auto_commit: true
          post_pr_comment: true
          enable_debug: true
